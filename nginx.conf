server {
    listen 80;
    server_name localhost thomian-lib.com www.thomian-lib.com;

    # Trust Cloudflare's IP ranges so real_ip is forwarded correctly
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (book covers, patron photos)
    client_max_body_size 20M;

    # Frontend SPA Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy to Django Backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Static files for Django Admin / REST Framework
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media files (Book covers etc)
    location /media/ {
        alias /app/media/;
    }
}
